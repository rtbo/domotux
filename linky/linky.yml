tic:
  device_path: /dev/ttyAMA0
  checksum_mode: 1
  ignore:
  - MOTDETAT
  - DEMAIN
publish:
  broker: domotux.lan
  power:
    topic: domotux/papp
    tic_field: PAPP
  meters:
    min_interval: 60
    topic: domotux/compteurs
    active_meter: PTEC
    meters:
      BASE: TH
      HCHC: HC
      HCHP: HP
      EJPHN: HN
      EJPHPM: PM
      BBRHCJB: HCJB
      BBRHPJB: HPJB
      BBRHCJW: HCJW
      BBRHPJW: HPJW
      BBRHCJR: HCJR
      BBRHPJR: HPJR
  contract:
    min_interval: 86400
    topic_prefix: domotux/contrat
    fields:
    - ADCO
    - OPTARIF
    - ISOUSC
    - IMAX

